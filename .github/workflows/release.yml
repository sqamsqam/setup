name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run tests
        run: go test ./internal/...

      - name: Run vet
        run: go vet ./internal/... ./cmd/...

      - name: Build binary
        run: make build VERSION=${{ github.ref_name }}

      - name: Verify binary
        run: file bin/setup-linux-amd64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: bin/setup-linux-amd64
          generate_release_notes: true
