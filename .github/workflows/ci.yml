name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Vet
        run: go vet ./internal/... ./cmd/...

      - name: Test
        run: go test ./internal/...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  visual:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Generate visual assets
        run: make plate

      - name: Upload visual assets
        uses: actions/upload-artifact@v6
        with:
          name: visual-assets
          path: docs/assets
