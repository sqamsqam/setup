name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Vet
        run: go vet ./internal/... ./cmd/...

      - name: Test
        run: go test ./internal/...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
